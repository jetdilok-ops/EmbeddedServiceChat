      const path = window.location.pathname;

      let config = {};

      // 👉 Decide which deployment to use
      if (path.startsWith('/a')) {
        // ===== Influencer_Directory =====
        config = {
          name: 'Influencer_Directory',
          baseUrl: 'https://energy-momentum-9158--wisesight.sandbox.my.site.com/ESWInfluencerDirectory1773816667783',
          scriptUrl: 'https://energy-momentum-9158--wisesight.sandbox.my.site.com/ESWInfluencerDirectory1773816667783/assets/js/bootstrap.min.js'
        };
      } else {
        // ===== Warroom =====
        config = {
          name: 'Warroom',
          baseUrl: 'https://energy-momentum-9158--wisesight.sandbox.my.site.com/ESWWarroom1773820485066',
          scriptUrl: 'https://energy-momentum-9158--wisesight.sandbox.my.site.com/ESWWarroom1773820485066/assets/js/bootstrap.min.js'
        };
      }

      // 👉 Load script dynamically
      const script = document.createElement('script');
      script.src = config.scriptUrl;

      script.onload = function () {
        try {
          embeddedservice_bootstrap.settings.language = 'en_US';

          embeddedservice_bootstrap.init(
            '00DWK000004gqG1',
            config.name,
            config.baseUrl,
            {
              scrt2URL: 'https://energy-momentum-9158--wisesight.sandbox.my.salesforce-scrt.com'

        }

      console.log("name:", config.name);
      console.log("baseUrl:", config.baseUrl);
      document.body.appendChild(script);
    }

    // Run after page load
    window.addEventListener('load', loadMessaging);
